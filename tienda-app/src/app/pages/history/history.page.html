<ion-header>
  <ion-toolbar color="tertiary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/cart"></ion-back-button>
    </ion-buttons>
    <ion-title>Historial de Compras</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="salesHistory.length === 0" class="ion-text-center" style="margin-top: 100px;">
    <ion-icon name="receipt-outline" style="font-size: 64px; color: #ccc;"></ion-icon>
    <p style="color: #666;">No has realizado ninguna compra todavía.</p>
    <ion-button fill="clear" routerLink="/home">Ir a la tienda</ion-button>
  </div>

  <ion-list *ngIf="salesHistory.length > 0">
    <ion-item-group *ngFor="let sale of salesHistory" style="margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden;">
      
      <ion-item-divider color="light">
        <ion-icon name="time-outline" slot="start"></ion-icon>
        <ion-label>
          <strong>Fecha:</strong> {{ sale.date }}
        </ion-label>
      </ion-item-divider>

      <ion-item *ngFor="let product of sale.products">
        <ion-label>
          <h3>{{ product.title }}</h3>
          <p>{{ product.price | currency }}</p>
        </ion-label>
      </ion-item>

      <ion-item lines="none">
        <ion-icon name="cash-outline" slot="start" color="success"></ion-icon>
        <ion-label>
          <h2 style="font-weight: bold; text-align: right;">Total Pagado: {{ sale.total | currency }}</h2>
        </ion-label>
      </ion-item>

    </ion-item-group>
  </ion-list>
</ion-content>
