<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Mi Carrito</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/history">
        <ion-icon slot="icon-only" name="receipt-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list *ngIf="cartItems.length > 0">
    <ion-item-sliding *ngFor="let item of cartItems; let i = index">
      <ion-item>
        <ion-thumbnail slot="start">
          <img [src]="item.image" />
        </ion-thumbnail>
        <ion-label>
          <h3>{{ item.title }}</h3>
          <p><strong>{{ item.price | currency }}</strong></p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="removeItem(i)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div *ngIf="cartItems.length === 0" class="ion-text-center" style="margin-top: 50px;">
    <p>El carrito está vacío</p>
    <ion-button fill="clear" routerLink="/home">Volver a la tienda</ion-button>
  </div>
</ion-content>

<ion-footer *ngIf="cartItems.length > 0">
  <ion-toolbar color="light" class="ion-padding">
    <ion-label slot="start">
      Total: <h2 style="margin:0">{{ total | currency }}</h2>
    </ion-label>
    <ion-button slot="end" color="success" (click)="checkout()">Pagar</ion-button>
  </ion-toolbar>
</ion-footer>
